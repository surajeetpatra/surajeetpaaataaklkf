        return (
            <Section
                title="ଭବିଷ୍ୟତ ଲକ୍ଷ୍ୟ"
                subtitle="ମୁଁ ଏହି ପ୍ରତିଜ୍ଞା କରେ, ଯେ ସଦା ତୁମ ସହିତ ରହିବି ❤️"
            >
                <div className="relative max-w-5xl mx-auto">
                      {/* Timeline line - hidden on mobile */}
                    <div className="hidden md:block absolute top-1/2 left-0 w-full h-0.5 bg-white/20 -translate-y-1/2"></div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-8">
                        {goals.map((goal, index) => (
                            <div key={index} className="relative">
                                {/* Timeline dot - hidden on mobile */}
                                <div className="hidden md:block absolute top-1/2 left-1/2 w-4 h-4 bg-pink-500 rounded-full -translate-x-1/2 -translate-y-1/2 shadow-[0_0_10px_theme(colors.pink.400)]"></div>
                                <GlassCard className="h-full">
                                    <h3 className="font-orbitron text-xl font-bold text-indigo-400">{goal.title}</h3>
                                    <p className="mt-2 text-gray-300 text-sm">{goal.text}</p>
                                </GlassCard>
                            </div>
                        ))}
                    </div>
                </div>
            </Section>
        );
    };

      // Main App component from App.tsx
    const App = () => {
        const [names, setNames] = useState(['ସୂର୍ଯ୍ୟ', 'ଚିନୁ']);
        const [isPlaying, setIsPlaying] = useState(false);
        const audioRef = useRef(null);

        const swapNames = useCallback(() => {
            setNames(prevNames => [prevNames[1], prevNames[0]]);
        }, []);

        const toggleMusic = useCallback(() => {
            if (audioRef.current) {
                if (isPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play().catch(error => console.error("Audio play failed:", error));
                }
                setIsPlaying(!isPlaying);
            }
        }, [isPlaying]);
        
        useEffect(() => {
            if(audioRef.current) {
                audioRef.current.volume = 0.3;
            }
        }, [])

        return (
            <div className="relative min-h-screen bg-black text-white overflow-x-hidden">
                <StarryBackground />

                <main className="relative z-10 p-4 sm:p-8">
                    <div className="container mx-auto max-w-6xl space-y-24 sm:space-y-48">
                        <Hero name1={names[0]} name2={names[1]} onSwap={swapNames} />
                        <LoveForever />
                        <GlowingMoments />
                        <Memories />
                        <FutureGoals />
                    </div>
                </main>

                <footer className="relative z-10 text-center p-12 text-gray-400">
            ମୋ ଜୀବନରେ ଆସିଥିବାକୁ ଧନ୍ୟବାଦ।
                </footer>
                
        <audio ref={audioRef} autoPlay loop>
<source src="https://manual-chocolate-20ukh5dtt5.edgeone.app/ssvid.net--Jibuni-Kebe-Tu-Mothu-Durei-Paribi-Nahi-Re-Banchi-Mu.mp3" type="audio/mp3" />
</audio>

                <button
                    onClick={toggleMusic}
                    className="fixed bottom-6 right-6 z-50 flex items-center gap-2 px-4 py-2 bg-black/50 backdrop-blur-sm border border-white/20 rounded-full text-sm hover:bg-white/20 transition-colors"
                >
                    {isPlaying ? <PauseIcon /> : <PlayIcon />}
                ସଙ୍ଗୀତ ଚାଲାନ୍ତୁ
                </button>
            </div>
        );
    };

      // Renders the app, from index.tsx
    const rootElement = document.getElementById('root');
    if (rootElement) {
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    }

    </script>
</body>
</html>
